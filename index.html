<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <title>Islomjon Boymirzayev — BizningGosht</title>
    <meta name="description" content="Цифровая визитка · Islomjon Boymirzayev · Founder, BizningGosht">

    <!-- Красивый предпросмотр при отправке ссылки в Telegram / WhatsApp -->
    <meta property="og:title" content="Islomjon Boymirzayev — BizningGosht">
    <meta property="og:description" content="Founder, BizningGosht. Нажмите, чтобы сохранить контакт.">
    <meta property="og:image" content="logo.png">
    <meta property="og:type" content="profile">

    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="stylesheet" href="main.css">
</head>
<body>

    <div class="bg-blob bg-blob--1" aria-hidden="true"></div>
    <div class="bg-blob bg-blob--2" aria-hidden="true"></div>
    <div class="bg-grain" aria-hidden="true"></div>

    <main class="scene">
        <div class="card" id="card" role="button" tabindex="0"
             aria-label="Визитка. Нажмите, чтобы перевернуть">

            <!-- ЛИЦЕВАЯ СТОРОНА -->
            <section class="face face--front">
                <div class="face__glow" aria-hidden="true"></div>

                <div class="brandbar">
                    <span class="brandbar__name">BizningGosht</span>
                    <span class="brandbar__rule" aria-hidden="true"></span>
                </div>

                <div class="front-center">
                    <div class="logo-badge">
                        <img src="logo.png" alt="Логотип BizningGosht">
                    </div>

                    <div class="identity">
                        <h1 class="identity__name">Islomjon&nbsp;Boymirzayev</h1>
                        <p class="identity__title">
                            <span class="identity__rule" aria-hidden="true"></span>
                            Founder
                            <span class="identity__rule" aria-hidden="true"></span>
                        </p>
                    </div>
                </div>

                <span class="flip-hint">
                    <span class="flip-hint__icon" aria-hidden="true">⟲</span>
                    Нажмите, чтобы открыть контакты
                </span>
            </section>

            <!-- ОБРАТНАЯ СТОРОНА -->
            <section class="face face--back">
                <div class="face__glow" aria-hidden="true"></div>

                <header class="back-head">
                    <span class="back-head__brand">BizningGosht</span>
                    <span class="back-head__sub">Контакты</span>
                </header>

                <div class="contacts">
                    <a class="contact" href="tel:+998946666664" data-noflip>
                        <span class="contact__ic" aria-hidden="true">
                            <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M6.6 2h3.1l1.6 4-2.1 1.5a13 13 0 0 0 5.8 5.8L16.5 11l4 1.6v3.1c0 1-.8 1.9-1.9 1.8C9.7 17 4 11.3 3.1 2.9 3 1.8 3.9 1 4.9 1z"/></svg>
                        </span>
                        <span class="contact__txt">
                            <small>Телефон</small>
                            +998 94 666 66 64
                        </span>
                    </a>

                    <a class="contact" href="mailto:islomgosht@gmail.com" data-noflip>
                        <span class="contact__ic" aria-hidden="true">
                            <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M3 5h18a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1zm9 7L4 7v1l8 5 8-5V7z"/></svg>
                        </span>
                        <span class="contact__txt">
                            <small>Email</small>
                            islomgosht@gmail.com
                        </span>
                    </a>

                    <a class="contact" href="https://t.me/MBimporteRs" target="_blank" rel="noopener" data-noflip>
                        <span class="contact__ic" aria-hidden="true">
                            <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M21.9 4.3 18.6 19c-.2 1-.9 1.3-1.8.8l-4.9-3.6-2.4 2.3c-.3.3-.5.5-1 .5l.4-5 9-8.1c.4-.3-.1-.5-.6-.2L6.2 13.1l-4.8-1.5c-1-.3-1-1 .2-1.5l18.8-7.2c.9-.3 1.6.2 1.5 1.4z"/></svg>
                        </span>
                        <span class="contact__txt">
                            <small>Telegram</small>
                            @MBimporteRs
                        </span>
                    </a>
                </div>

                <div class="qr">
                    <div class="qr__tile">
                        <img src="qr.svg" alt="QR-код с контактом Islomjon Boymirzayev">
                    </div>
                    <span class="qr__cap">Наведите камеру — контакт сохранится сам</span>
                </div>

                <button class="save-btn" type="button" data-noflip aria-label="Сохранить контакт на телефон">
                    <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M12 3v9.6l3.3-3.3 1.4 1.4L12 16.4 7.3 10.7l1.4-1.4L12 12.6V3zM5 18h14v2H5z"/></svg>
                    Сохранить контакт
                </button>

                <span class="flip-hint flip-hint--back">
                    <span class="flip-hint__icon" aria-hidden="true">⟲</span>
                    Назад
                </span>
            </section>
        </div>
    </main>

    <script src="main.js"></script>
</body>
</html>
